name: run-tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        php: [8.4, 8.3, 8.2, 8.1]
        laravel: ["^13.0", "^12.0", "^11.0", "^10.0", "^9.38"]
        stability: [prefer-lowest, prefer-stable]
        include:
          - laravel: "^13.0"
            testbench: 11.*
          - laravel: "^12.0"
            testbench: 10.*
          - laravel: "^11.0"
            testbench: 9.*
          - laravel: "^10.0"
            testbench: 8.*
          - laravel: "^9.38"
            testbench: 7.*
        exclude:
          - laravel: "^11.0"
            php: 8.1
          - laravel: "^13.0"
            php: 8.1
          - laravel: "^13.0"
            php: 8.2
          - laravel: "^13.0"
            stability: prefer-lowest
          - laravel: "^12.0"
            php: 8.1
          - laravel: "^11.0"
            stability: prefer-lowest
          - laravel: "^10.0"
            stability: prefer-lowest

    name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.stability }} - ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Remove larastan from dev dependencies
        run: composer remove --dev nunomaduro/larastan

      - name: Upgrade Pest for Laravel 13
        if: matrix.laravel == '^13.0'
        run: composer require 'pestphp/pest:^4.0' 'pestphp/pest-plugin-laravel:^4.0' --dev --no-update

      - name: Install dependencies
        run: |
          composer require 'illuminate/contracts=${{ matrix.laravel }}.0' --no-update
          composer update --prefer-dist --no-interaction --no-progress --${{ matrix.stability }}

      - name: Execute tests
        run: vendor/bin/pest
